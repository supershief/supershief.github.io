<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiva Rampersad — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Open Sans', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; -webkit-font-smoothing: antialiased; }
.label { font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 24px; }
h1 { font-family: 'Alfa Slab One', serif; font-size: clamp(36px, 8vw, 80px); font-weight: 400; color: #fff; margin-bottom: 48px; text-align: center; }
.cases { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; }
.case-link { display: flex; justify-content: space-between; align-items: center; background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 12px; padding: 20px 24px; text-decoration: none; color: #f0f0f0; transition: border-color 0.2s, background 0.2s; }
.case-link:hover { border-color: #534AB7; background: #1e1c2e; }
.case-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.case-sub { font-size: 13px; color: #888; }
.case-arrow { font-size: 18px; color: #534AB7; }
</style>
</head>
<body>
  <p class="label">Portfolio — Shiva Rampersad</p>
  <h1>Cases</h1>
  <div class="cases">
    <a href="/lift/" class="case-link">
      <div>
        <p class="case-title">Lift</p>
        <p class="case-sub">UX Design & Development — Training tracker app</p>
      </div>
      <span class="case-arrow">→</span>
    </a>
    <a href="/jones/" class="case-link">
      <div>
        <p class="case-title">Jones Vastgoed Advies</p>
        <p class="case-sub">Logo-ontwerp & Branding</p>
      </div>
      <span class="case-arrow">→</span>
    </a>
  </div>
</body>
</html>
